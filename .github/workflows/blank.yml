name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:

  # ── 1. Verify the environment can be built ──────────────────────────────────
  build-env:
    name: Build conda environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: rift-eeg
          environment-file: environment.yml
          auto-activate-base: false
          miniforge-variant: Mambaforge   # faster solves with mamba
          miniforge-version: "23.11.0-0"
          
      - name: Verify key imports
        shell: bash -el {0}
        run: |
          python -c "import mne; print('MNE version:', mne.__version__)"
          python -c "import mne_connectivity; print('mne-connectivity OK')"
          python -c "import numpy, scipy, pandas, matplotlib; print('Core stack OK')"

  # ── 2. Lint notebooks and any .py helper scripts ────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    needs: build-env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: rift-eeg
          environment-file: environment.yml
          auto-activate-base: false
          miniforge-variant: Mambaforge
          miniforge-version: "23.11.0-0"

      - name: Lint .py files
        shell: bash -el {0}
        run: ruff check . --exclude ".ipynb_checkpoints"

      #- name: Lint notebooks
       # shell: bash -el {0}
        #run: python -m pytest --nbmake notebooks/ -v --nbmake-timeout=300
        #nbqa ruff notebooks/ --ignore=E402,E501
        # E402: module-level imports not at top (common in notebooks)
        # E501: line too long (also relaxed for notebooks)

  # ── 3. Execute notebooks with synthetic MNE data ────────────────────────────
  test-notebooks:
    name: Execute notebooks (synthetic data)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: rift-eeg
          environment-file: environment.yml
          auto-activate-base: false
          miniforge-variant: Mambaforge
          miniforge-version: "23.11.0-0"

      #- name: Run notebooks with nbmake
       # shell: bash -el {0}
        #env:
         # CI: "true"          # notebooks check this to skip real data loading
        #run: |python -m pytest --nbmake notebooks/ -v --nbmake-timeout=300
